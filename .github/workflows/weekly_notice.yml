name: Weekly Business Notice Monitor

on:
  schedule:
    - cron: "0 2 * * 1"  # 매주 월요일 11:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py

      - name: Commit updated seen URLs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_urls.json latest_notices.json
          git commit -m "Update seen notice history" || echo "No changes to commit"
          git push

      - name: Upload latest result
        uses: actions/upload-artifact@v4
        with:
          name: latest-notices
          path: latest_notices.json
