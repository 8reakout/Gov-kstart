name: K-Startup Notice Monitor

on:
  schedule:
    - cron: "0 21 * * *"  # 매주 월요일 11:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run K-Startup monitor
        env:
          KSTARTUP_SERVICE_KEY: ${{ secrets.KSTARTUP_SERVICE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py

      - name: Commit updated seen IDs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_notice_ids.json
          git commit -m "Update K-Startup seen notice IDs" || echo "No changes to commit"
          git push

      - name: Upload latest result
        uses: actions/upload-artifact@v4
        with:
          name: latest-kstartup-notices
          path: latest_notices.json
