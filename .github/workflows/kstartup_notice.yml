name: K-Startup Email Notice Monitor

on:
  schedule:
   - cron: "11 23 * * 2"  # 매주 test test
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run K-Startup email monitor
        env:
          KSTARTUP_SERVICE_KEY: ${{ secrets.KSTARTUP_SERVICE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_CC: ${{ secrets.MAIL_CC }}
        run: python main.py

      - name: Commit updated notice state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_notice_ids.json
          git commit -m "Update seen K-Startup email notices" || echo "No changes to commit"
          git push
